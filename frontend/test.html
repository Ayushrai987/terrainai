<!DOCTYPE html>
<html>
<head>
  <title>Terrain AI Test</title>
  <style>
    body { font-family: Arial; background: #0a0e1a; color: white; padding: 20px; }
    h1 { color: #00d4e8; }
    input, button { padding: 10px; margin: 10px 0; font-size: 16px; }
    button { background: #00d4e8; color: black; border: none; cursor: pointer; border-radius: 6px; }
    #results { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    img { max-width: 600px; border-radius: 8px; }
    #stats { background: #0f2035; padding: 15px; border-radius: 8px; min-width: 250px; }
    .stat { margin: 8px 0; }
    .val { color: #00e676; font-weight: bold; font-size: 20px; }
  </style>
</head>
<body>
  <h1>🌍 Terrain AI — Test</h1>
  <input type="file" id="imgInput" accept="image/*">
  <button onclick="runSegment()">▶ Segment Image</button>
  <p id="status" style="color:#ffb74d"></p>

  <div id="results" style="display:none">
    <div>
      <p style="color:#00d4e8">Original</p>
      <img id="origImg">
    </div>
    <div>
      <p style="color:#00e676">Segmented Overlay</p>
      <img id="outImg">
    </div>
    <div id="stats">
      <p style="color:#00d4e8;font-weight:bold">📊 Results</p>
      <div class="stat">Traversability: <span class="val" id="trav"></span>/10</div>
      <div class="stat">Safe Path: <span class="val" id="path"></span></div>
      <div class="stat">Speed: <span class="val" id="speed"></span>ms</div>
      <div class="stat">mIoU: <span class="val" id="miou"></span>%</div>
      <hr style="border-color:#1a2e40;margin:12px 0">
      <p style="color:#00d4e8;font-weight:bold">🗺 Classes Found:</p>
      <div id="classes"></div>
    </div>
  </div>

<script>
const API = "http://localhost:8000";

async function runSegment() {
  const file = document.getElementById('imgInput').files[0];
  if (!file) { alert('Pehle image select karo!'); return; }

  document.getElementById('status').textContent = '⏳ Processing...';
  document.getElementById('results').style.display = 'none';

  // Show original
  document.getElementById('origImg').src = URL.createObjectURL(file);

  const fd = new FormData();
  fd.append('file', file);

  try {
    const t0 = Date.now();
    const res = await fetch(API + '/segment', { method: 'POST', body: fd });
    const data = await res.json();

    if (data.error) {
      document.getElementById('status').textContent = '❌ Error: ' + data.error;
      return;
    }

    // Show output
    document.getElementById('outImg').src = 'data:image/png;base64,' + data.overlay_b64;
    document.getElementById('trav').textContent = data.traversability;
    document.getElementById('path').textContent = data.best_path.replace('_',' ');
    document.getElementById('speed').textContent = data.inference_ms;
    document.getElementById('miou').textContent = data.miou;

    // Classes
    let html = '';
    for (const [name, pct] of Object.entries(data.classes)) {
      const w = Math.min(pct * 3, 100);
      html += `<div style="margin:4px 0">
        <span style="font-size:12px;color:#8899aa">${name}</span>
        <span style="float:right;color:#00e676">${pct}%</span>
        <div style="background:#1a2e40;height:6px;border-radius:3px;margin-top:2px">
          <div style="background:#00e676;width:${w}%;height:6px;border-radius:3px"></div>
        </div>
      </div>`;
    }
    document.getElementById('classes').innerHTML = html;

    document.getElementById('results').style.display = 'flex';
    document.getElementById('status').textContent = '✅ Done!';
  } catch(e) {
    document.getElementById('status').textContent = '❌ Server se connect nahi hua. Kya uvicorn chal rahi hai?';
  }
}
</script>
</body>
</html>
